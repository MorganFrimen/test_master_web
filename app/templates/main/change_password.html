{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}

{% block content %}
<h1>🔐 Смена пароля</h1>
<p style="color: var(--text-gray);">Введите старый и новый пароли</p>

    {% if error %}
<p style="color: var(--accent-red); font-size: 14px; margin-bottom: 10px;">⚠️ {{ error }}</p>
    {% endif %}

<form method="POST" style="margin-top: 20px;">
    <input type="password" name="old_password" placeholder="Текущий пароль" required>
    <hr style="border: 0; border-top: 1px solid #3d3d3d; margin: 15px 0;">
    <input type="password" name="new_password" placeholder="Новый пароль" required>
    <input type="password" name="confirm_password" placeholder="Повторите новый пароль" required>

    <button type="submit" class="btn-modern btn-blue" style="width: 100%; margin-top: 10px;">
        Обновить пароль
    </button>
</form>

<a href="{{ url_for('main.profile') }}" class="footer-link">← Отмена</a>
{% endblock %}
